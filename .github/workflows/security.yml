name: Security Audit

on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday
  push:
    branches: [ main ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # Required for uploading SARIF results
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # Updated to v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4  # Updated to v4
        with:
          node-version: '20'  # Updated to Node 20 LTS
          cache: 'npm'
      
      - name: Check for package-lock files
        id: check-files
        run: |
          echo "root-lock=$([ -f package-lock.json ] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT
          echo "client-lock=$([ -f client/package-lock.json ] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT
          echo "server-lock=$([ -f server/package-lock.json ] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT
      
      - name: Run npm audit - Root
        if: steps.check-files.outputs.root-lock == 'true'
        run: |
          if [ -f package.json ]; then
            npm audit --audit-level=moderate || echo "::warning::npm audit found vulnerabilities in root"
          fi
      
      - name: Run npm audit - Client
        if: steps.check-files.outputs.client-lock == 'true'
        run: |
          if [ -f client/package.json ]; then
            cd client && npm audit --audit-level=moderate || echo "::warning::npm audit found vulnerabilities in client"
          fi
      
      - name: Run npm audit - Server
        if: steps.check-files.outputs.server-lock == 'true'
        run: |
          if [ -f server/package.json ]; then
            cd server && npm audit --audit-level=moderate || echo "::warning::npm audit found vulnerabilities in server"
          fi
      
      - name: Run Snyk security scan
        if: env.SNYK_TOKEN != ''
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=medium
      
      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'security-demo'
          path: '.'
          format: 'HTML'
          args: >
            --enableRetired
            --enableExperimental
        continue-on-error: true
      
      - name: Create reports directory
        run: mkdir -p reports
        
      - name: Upload dependency check results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports/
          retention-days: 30
          if-no-files-found: warn