# .github/workflows/test-secrets.yml
name: Test Secrets Configuration

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  test-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Check Secrets
        run: |
          echo "Checking secret configuration..."
          echo "================================"
          
          # Check each secret (without revealing values)
          if [ -n "${{ secrets.SNYK_TOKEN }}" ]; then
            echo "✅ SNYK_TOKEN is configured"
          else
            echo "❌ SNYK_TOKEN is missing"
          fi
          
          if [ -n "${{ secrets.DOCKER_USERNAME }}" ]; then
            echo "✅ DOCKER_USERNAME is configured"
          else
            echo "❌ DOCKER_USERNAME is missing"
          fi
          
          if [ -n "${{ secrets.DOCKER_PASSWORD }}" ]; then
            echo "✅ DOCKER_PASSWORD is configured"
          else
            echo "❌ DOCKER_PASSWORD is missing"
          fi
          
          if [ -n "${{ secrets.CODECOV_TOKEN }}" ]; then
            echo "✅ CODECOV_TOKEN is configured"
          else
            echo "❌ CODECOV_TOKEN is missing"
          fi
          
          if [ -n "${{ secrets.GITHUB_TOKEN }}" ]; then
            echo "✅ GITHUB_TOKEN is available (automatic)"
          else
            echo "❌ GITHUB_TOKEN is missing (this is unusual)"
          fi
          
      - name: Test Docker Login
        if: ${{ secrets.DOCKER_USERNAME != '' && secrets.DOCKER_PASSWORD != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          logout: true
        continue-on-error: true
      
      - name: Test Snyk
        if: ${{ secrets.SNYK_TOKEN != '' }}
        run: |
          npm install -g snyk
          snyk auth ${{ secrets.SNYK_TOKEN }}
          snyk test --dry-run || echo "Snyk test completed"
        continue-on-error: true
      
      - name: Summary
        run: |
          echo "## Secret Configuration Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Secret | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|" >> $GITHUB_STEP_SUMMARY
          
          [ -n "${{ secrets.SNYK_TOKEN }}" ] && echo "| SNYK_TOKEN | ✅ Configured |" >> $GITHUB_STEP_SUMMARY || echo "| SNYK_TOKEN | ❌ Missing |" >> $GITHUB_STEP_SUMMARY
          [ -n "${{ secrets.DOCKER_USERNAME }}" ] && echo "| DOCKER_USERNAME | ✅ Configured |" >> $GITHUB_STEP_SUMMARY || echo "| DOCKER_USERNAME | ❌ Missing |" >> $GITHUB_STEP_SUMMARY
          [ -n "${{ secrets.DOCKER_PASSWORD }}" ] && echo "| DOCKER_PASSWORD | ✅ Configured |" >> $GITHUB_STEP_SUMMARY || echo "| DOCKER_PASSWORD | ❌ Missing |" >> $GITHUB_STEP_SUMMARY
          [ -n "${{ secrets.CODECOV_TOKEN }}" ] && echo "| CODECOV_TOKEN | ✅ Configured |" >> $GITHUB_STEP_SUMMARY || echo "| CODECOV_TOKEN | ❌ Missing |" >> $GITHUB_STEP_SUMMARY
          [ -n "${{ secrets.GITHUB_TOKEN }}" ] && echo "| GITHUB_TOKEN | ✅ Available |" >> $GITHUB_STEP_SUMMARY || echo "| GITHUB_TOKEN | ❌ Missing |" >> $GITHUB_STEP_SUMMARY